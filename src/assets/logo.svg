<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="55%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE033"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- PDF document icon -->
  <g transform="translate(0, 5)">
    <rect x="0" y="0" width="46" height="58" rx="5" fill="url(#iconGrad)"/>
    <!-- Fold corner -->
    <path d="M30 0 L46 16 L30 16 Z" fill="url(#foldGrad)"/>
    <path d="M30 0 L30 16 L46 16" fill="url(#foldGrad)" opacity="0.5"/>
    <!-- Lines on doc -->
    <rect x="6" y="24" width="22" height="3" rx="1.5" fill="#1a1000" opacity="0.4"/>
    <rect x="6" y="31" width="18" height="3" rx="1.5" fill="#1a1000" opacity="0.35"/>
    <rect x="6" y="38" width="20" height="3" rx="1.5" fill="#1a1000" opacity="0.35"/>
    <rect x="6" y="45" width="14" height="3" rx="1.5" fill="#1a1000" opacity="0.3"/>
    <!-- PDF label -->
    <text x="23" y="17" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="7" font-weight="900" fill="#1a1000" opacity="0.8">PDF</text>
  </g>

  <!-- PDFKholo wordmark -->
  <text x="56" y="44" font-family="Arial Black, Impact, sans-serif" font-size="34" font-weight="900" fill="url(#textGrad)" letter-spacing="-0.5">PDF</text>
  <text x="56" y="66" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#ffffff" opacity="0.80" letter-spacing="4">Kholo</text>

  <!-- Divider line under PDF -->
  <rect x="56" y="48" width="110" height="1.5" rx="1" fill="#FFD700" opacity="0.3"/>
</svg>
